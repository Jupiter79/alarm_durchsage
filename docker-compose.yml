services:
  # Standard-Dienst (Perfekt für Windows/AMD64 ohne lokale Audioausgabe)
  alarmdurchsage:
    build: .
    container_name: alarmdurchsage
    restart: unless-stopped
    # Unter Windows MUSS port-mapping verwendet werden, 
    # da network_mode: "host" in Docker Desktop nicht wie auf echtem Linux funktioniert.
    ports:
      - "8122:8122"
    profiles:
      - windows
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock

  # Dienst für Raspberry Pi (ARM) / Linux mit Audio-Unterstützung
  alarmdurchsage-pi:
    build: .
    container_name: alarmdurchsage-pi
    restart: unless-stopped
    # Auf echtem Linux/Pi verwenden wir host-networking
    network_mode: "host"
    privileged: true
    environment:
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/dbus/system_bus_socket
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - SDL_AUDIODRIVER=alsa
    volumes:
      - "/dev/snd:/dev/snd"
      - ./:/app
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - pi


