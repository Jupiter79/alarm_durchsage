services:
  # Standard-Dienst (Perfekt für Windows/AMD64 ohne lokale Audioausgabe)
  alarmdurchsage:
    build: .
    container_name: alarmdurchsage
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./config.json:/app/config.json
      - ./log.json:/app/log.json
      - ./system.log:/app/system.log
      - ./gongs:/app/gongs
      - ./static:/app/static

  # Dienst für Raspberry Pi (ARM) / Linux mit Audio-Unterstützung
  alarmdurchsage-pi:
    extends:
      service: alarmdurchsage
    container_name: alarmdurchsage-pi
    devices:
      - "/dev/snd:/dev/snd"
    profiles:
      - pi

